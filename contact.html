<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Emmanuel Adeitan</title>
  <meta name="description" content="Get in touch with Emmanuel Adeitan.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ HEADER / NAVIGATION ============ -->
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a href="index.html" class="brand">Emmanuel Adeitan</a>

      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- ============ PAGE INTRO ============ -->
    <section class="section">
      <div class="container">
        <h1>Let's get in touch</h1>
        <p>Have a question, opportunity, or just want to connect? Fill out the form below, every field is validated before it can be sent.</p>
      </div>
    </section>

    <!-- ============ CONTACT FORM ============ -->
    <section class="section">
      <div class="container">
        <form id="contact-form" class="contact-form" novalidate>

          <div class="field" id="field-name">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="Your full name">
            <span class="field-error" id="error-name"></span>
          </div>

          <div class="field" id="field-email">
            <label for="email">Email address</label>
            <input type="text" id="email" name="email" placeholder="you@example.com">
            <span class="field-error" id="error-email"></span>
          </div>

          <div class="field" id="field-phone">
            <label for="phone">Phone number</label>
            <input type="text" id="phone" name="phone" placeholder="Digits only, e.g. 08012345678">
            <span class="field-error" id="error-phone"></span>
          </div>

          <div class="field" id="field-message">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="What would you like to say?"></textarea>
            <span class="field-error" id="error-message"></span>
          </div>

          <button type="submit" class="btn btn-primary">Send message</button>

          <p class="form-status" id="form-status" role="status"></p>
        </form>
      </div>
    </section>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <div class="container footer-grid">
      <p>&copy; <span id="current-year"></span> Emmanuel Adeitan</p>
      <p><a href="contact.html">Let's connect →</a></p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
